version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecoplay
      POSTGRES_USER: ecoplay
      POSTGRES_PASSWORD: ecoplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoplay -d ecoplay"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: ../../infrastructure/docker/Dockerfile.backend
    ports:
      - "3001:3001"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://ecoplay:ecoplay@postgres:5432/ecoplay
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    depends_on:
      - backend

  agent-dashboard:
    build:
      context: ../../apps/agent-dashboard
      dockerfile: ../../infrastructure/docker/Dockerfile.web
    ports:
      - "3001:3000"
    env_file:
      - ../../.env
    depends_on:
      - backend

volumes:
  postgres_data:
